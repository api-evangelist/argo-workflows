aid: argo-workflows
name: Argo Workflows
description: >-
  Argo Workflows is an open-source, container-native workflow engine for orchestrating parallel
  jobs on Kubernetes. It is a CNCF graduated project that allows you to define workflows where
  each step is a container, model multi-step workflows as sequences of tasks or DAGs, and run
  compute-intensive jobs for machine learning, data processing, and CI/CD pipelines natively
  on Kubernetes. Governed by the Linux Foundation and the CNCF.
